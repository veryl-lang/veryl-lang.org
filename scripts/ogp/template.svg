<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0a2418"/>
    </linearGradient>
    <linearGradient id="vmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3fd07a"/>
      <stop offset="1" stop-color="#2baa59"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Veryl green accent stripe along the bottom -->
  <rect x="0" y="618" width="1200" height="12" fill="url(#vmark)"/>

  <!-- Top-left brand: official logo + wordmark -->
  <g transform="translate(80, 80)">
    <image x="0" y="0" width="96" height="96" href="data:image/png;base64,__LOGO_B64__"/>
    <text x="118" y="68" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Veryl</text>
  </g>

  <!-- Title (multi-line, injected) -->
  <text x="80" y="__TITLE_Y__" font-size="__TITLE_SIZE__" font-weight="700" fill="#ffffff" letter-spacing="-1">__TITLE_LINES__</text>

  <!-- Subtitle -->
  <text x="80" y="__SUBTITLE_Y__" font-size="28" font-weight="500" fill="#8b949e" letter-spacing="0.3">__SUBTITLE__</text>

  <!-- Bottom-right tagline -->
  <text x="1120" y="585" font-size="22" font-weight="500" fill="#8b949e" text-anchor="end">A modern hardware description language</text>
</svg>
